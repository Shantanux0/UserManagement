version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: user_management_db
    environment:
      POSTGRES_USER: user_manager
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: user_management
    ports:
      - "5433:5432" # Map host 5433 to avoid collision with local PG on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_manager -d user_management"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: user_management_api
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: "postgres://user_manager:super_secret_password@db:5432/user_management?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
